{% extends 'base.html' %}
{% load static %}

{% block title %}Contact - Bichem Laboratories{% endblock %}


{% block content %}
<div class="contact-container">
    <h2 class="contact-heading">Contact Us</h2>

    <div class="contact-content">
        <!-- Contact Form -->
        <div class="contact-form">
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>

        <!-- Contact Info -->
        <div class="contact-info">
            <h3>Our Office</h3>
            <p><i class="fas fa-map-marker-alt"></i> 160, Gali No – 4, Karawal Nagar Extension</p>
            <p><i class="fas fa-phone-alt"></i>+91 8083748742</p>
            <p><i class="fas fa-phone-alt"></i>+91 7903021646</p>
            <p><i class="fas fa-envelope"></i> info@bichemlaboratories.com</p>

            <!-- Optional: Google Map -->
            <iframe 
                src="https://www.google.com/maps/embed?...your-location-url..." 
                width="100%" 
                height="250" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>
    </div>
</div>
{% endblock %}
