{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Bichem Laboratories">
    <meta name="theme-color" content="#0f5132">
    <title>{% block title %}Bichem Laboratories | Veterinary & Poultry Healthcare{% endblock %}</title>
    {% block meta %}
    <meta name="description" content="Bichem Laboratories manufactures trusted veterinary, poultry, livestock, aquaculture, and animal healthcare products for better farm performance.">
    <meta name="keywords" content="Bichem Laboratories, veterinary products, poultry products, livestock supplements, animal healthcare products">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Bichem Laboratories - Veterinary & Poultry Healthcare">
    <meta property="og:description" content="Premium veterinary and poultry healthcare products for livestock, pets, aquaculture, and farms.">
    <meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/logo.jpg' %}">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="{{ request.build_absolute_uri }}">
    {% endblock %}
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/stylle.css' %}">
</head>

<body>
    {% include 'header.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

    <a class="floating-contact floating-whatsapp" href="https://wa.me/918083748742?text=Hello%20Bichem%20Laboratories%2C%20I%20want%20to%20enquire%20about%20your%20products." aria-label="Chat on WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>
    <a class="floating-contact floating-call" href="tel:+918083748742" aria-label="Call Bichem Laboratories">
        <i class="fas fa-phone-alt"></i>
    </a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="{% static 'js/scriipt.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
