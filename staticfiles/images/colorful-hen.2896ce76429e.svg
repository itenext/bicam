<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background decoration -->
  <circle cx="50" cy="50" r="20" fill="#FFE5E5" opacity="0.5"/>
  <circle cx="350" cy="50" r="25" fill="#E5FFE5" opacity="0.5"/>
  <circle cx="200" cy="280" r="15" fill="#E5E5FF" opacity="0.5"/>
  
  <!-- Body -->
  <ellipse cx="200" cy="180" rx="100" ry="80" fill="#FF9933" stroke="#FF7733" stroke-width="3"/>
  
  <!-- Decorative feather patterns on body -->
  <path d="M150 160 Q200 180 150 200" fill="#FFB366" stroke="#FF9933" stroke-width="2"/>
  <path d="M170 150 Q220 170 170 190" fill="#FFCC99" stroke="#FFB366" stroke-width="2"/>
  <path d="M190 140 Q240 160 190 180" fill="#FFE5CC" stroke="#FFCC99" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="300" cy="120" r="40" fill="#FF7733" stroke="#FF6600" stroke-width="2"/>
  
  <!-- Comb -->
  <path d="M290 85 L300 70 L310 85 L320 70 L330 85" fill="#FF3333" stroke="#FF0000" stroke-width="2"/>
  
  <!-- Wattle -->
  <path d="M290 130 Q300 150 310 130" fill="#FF3333" stroke="#FF0000" stroke-width="2"/>
  
  <!-- Beak -->
  <path d="M330 120 L360 125 L330 130" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
  
  <!-- Eye -->
  <circle cx="315" cy="115" r="5" fill="#000000"/>
  <circle cx="313" cy="113" r="2" fill="#FFFFFF"/>
  
  <!-- Wing -->
  <path d="M180 150 Q200 200 160 200" fill="#FF8C66" stroke="#FF7733" stroke-width="2"/>
  <path d="M175 155 Q195 195 165 195" fill="#FFB366" stroke="#FF9933" stroke-width="2"/>
  
  <!-- Tail Feathers - More decorative -->
  <path d="M100 140 Q120 100 140 140" fill="#FF6600" stroke="#FF4D00" stroke-width="2"/>
  <path d="M90 150 Q110 110 130 150" fill="#FF8533" stroke="#FF6600" stroke-width="2"/>
  <path d="M80 160 Q100 120 120 160" fill="#FFA366" stroke="#FF8533" stroke-width="2"/>
  
  <!-- Decorative tail patterns -->
  <path d="M95 145 Q115 105 135 145" fill="#FFB366" stroke="#FF9933" stroke-width="1" opacity="0.7"/>
  <path d="M85 155 Q105 115 125 155" fill="#FFCC99" stroke="#FFB366" stroke-width="1" opacity="0.7"/>
  
  <!-- Legs -->
  <line x1="180" y1="250" x2="180" y2="280" stroke="#FFB366" stroke-width="4"/>
  <line x1="220" y1="250" x2="220" y2="280" stroke="#FFB366" stroke-width="4"/>
  
  <!-- Feet -->
  <path d="M175 280 L180 280 L185 280" stroke="#FFB366" stroke-width="4"/>
  <path d="M215 280 L220 280 L225 280" stroke="#FFB366" stroke-width="4"/>
  
  <!-- Additional decorative elements -->
  <circle cx="190" cy="170" r="5" fill="#FFCC99" opacity="0.5"/>
  <circle cx="210" cy="190" r="4" fill="#FFE5CC" opacity="0.5"/>
  <circle cx="230" cy="175" r="6" fill="#FFB366" opacity="0.5"/>
</svg>
